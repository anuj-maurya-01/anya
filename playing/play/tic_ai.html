<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic Tac Toe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .cell {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .cell:hover:not(.taken) {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
            cursor: pointer;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .x-mark {
            color: #00f5ff;
            text-shadow: 0 0 20px #00f5ff, 0 0 40px #00f5ff;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .o-mark {
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .winning-cell {
            animation: winnerPulse 1s infinite;
            background: rgba(255, 215, 0, 0.2) !important;
            border-color: #ffd700 !important;
        }

        @keyframes winnerPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.8); }
        }

        .strike-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            height: 4px;
            border-radius: 2px;
            box-shadow: 0 0 20px #ffd700;
            transform-origin: left center;
            animation: strikeDraw 0.5s ease-out forwards;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes strikeDraw {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        .btn-neon {
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .btn-neon:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px currentColor;
        }

        .btn-neon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-neon:active::after {
            width: 300px;
            height: 300px;
        }

        .modal-overlay {
            backdrop-filter: blur(5px);
            background: rgba(0, 0, 0, 0.8);
        }

        .slide-in {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .difficulty-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00f5ff;
            color: #00f5ff;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        /* Particle effect for wins */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 1s ease-out forwards;
        }

        @keyframes particleFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-lg">
        <!-- Header -->
        <div class="text-center mb-8 floating">
            <h1 class="font-orbitron text-5xl md:text-6xl font-black mb-2 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">
                TIC TAC TOE
            </h1>
            <p class="text-gray-400 text-sm tracking-widest uppercase">Neon Edition</p>
        </div>

        <!-- Score Board -->
        <div class="glass-panel rounded-2xl p-4 mb-6 flex justify-around items-center">
            <div class="text-center">
                <div class="text-cyan-400 font-orbitron text-2xl font-bold" id="scoreX">0</div>
                <div class="text-xs text-gray-400 uppercase tracking-wider">Player (X)</div>
            </div>
            <div class="text-center px-4">
                <div class="text-gray-500 font-orbitron text-xl font-bold" id="scoreDraw">0</div>
                <div class="text-xs text-gray-400 uppercase tracking-wider">Draws</div>
            </div>
            <div class="text-center">
                <div class="text-fuchsia-500 font-orbitron text-2xl font-bold" id="scoreO">0</div>
                <div class="text-xs text-gray-400 uppercase tracking-wider">AI (O)</div>
            </div>
        </div>

        <!-- Game Status -->
        <div class="text-center mb-4 h-8">
            <span id="statusText" class="font-orbitron text-lg text-cyan-300 tracking-wider">Your Turn</span>
        </div>

        <!-- Game Board -->
        <div class="glass-panel rounded-2xl p-4 relative">
            <div class="grid grid-cols-3 gap-3 aspect-square" id="gameBoard">
                <!-- Cells generated by JS -->
            </div>
            <div id="strikeLine" class="strike-line hidden"></div>
        </div>

        <!-- Controls -->
        <div class="mt-6 flex flex-col gap-3">
            <div class="flex gap-3 justify-center">
                <button onclick="resetGame()" class="btn-neon flex-1 bg-gradient-to-r from-cyan-600 to-cyan-700 hover:from-cyan-500 hover:to-cyan-600 text-white font-bold py-3 px-6 rounded-xl font-orbitron tracking-wider">
                    NEW GAME
                </button>
                <button onclick="showMenu()" class="btn-neon bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-6 rounded-xl font-orbitron tracking-wider">
                    MENU
                </button>
            </div>
            
            <div class="flex justify-center gap-2 mt-2">
                <button onclick="setDifficulty('easy')" class="difficulty-btn px-4 py-2 rounded-lg border border-gray-600 text-sm transition-all" data-diff="easy">EASY</button>
                <button onclick="setDifficulty('medium')" class="difficulty-btn px-4 py-2 rounded-lg border border-gray-600 text-sm transition-all active" data-diff="medium">MEDIUM</button>
                <button onclick="setDifficulty('hard')" class="difficulty-btn px-4 py-2 rounded-lg border border-gray-600 text-sm transition-all" data-diff="hard">UNBEATABLE</button>
            </div>
        </div>
    </div>

    <!-- Start Menu Modal -->
    <div id="startMenu" class="fixed inset-0 modal-overlay flex items-center justify-center z-50">
        <div class="glass-panel rounded-3xl p-8 max-w-md w-full mx-4 slide-in text-center">
            <h2 class="font-orbitron text-3xl font-bold mb-6 text-white">Choose Side</h2>
            
            <div class="flex justify-center gap-6 mb-8">
                <button onclick="startGame('X')" class="group relative w-24 h-24 rounded-2xl bg-gray-800 hover:bg-cyan-900 border-2 border-cyan-500 transition-all hover:scale-110 hover:shadow-[0_0_30px_rgba(0,245,255,0.5)]">
                    <span class="text-5xl font-bold text-cyan-400 group-hover:scale-110 inline-block transition-transform">X</span>
                </button>
                <button onclick="startGame('O')" class="group relative w-24 h-24 rounded-2xl bg-gray-800 hover:bg-fuchsia-900 border-2 border-fuchsia-500 transition-all hover:scale-110 hover:shadow-[0_0_30px_rgba(255,0,255,0.5)]">
                    <span class="text-5xl font-bold text-fuchsia-500 group-hover:scale-110 inline-block transition-transform">O</span>
                </button>
            </div>

            <p class="text-gray-400 text-sm mb-4">Play as X or O</p>
            <p class="text-xs text-gray-500">AI uses Minimax Algorithm on Hard mode</p>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="fixed inset-0 modal-overlay flex items-center justify-center z-50 hidden">
        <div class="glass-panel rounded-3xl p-8 max-w-sm w-full mx-4 slide-in text-center border-2 border-yellow-500/50">
            <div id="winnerIcon" class="text-6xl mb-4 animate-bounce">🏆</div>
            <h2 id="winnerText" class="font-orbitron text-3xl font-bold mb-2 text-yellow-400">YOU WIN!</h2>
            <p id="winnerSubtext" class="text-gray-300 mb-6">Congratulations!</p>
            
            <button onclick="resetGame(); document.getElementById('gameOverModal').classList.add('hidden');" 
                    class="btn-neon w-full bg-gradient-to-r from-yellow-600 to-orange-600 hover:from-yellow-500 hover:to-orange-500 text-white font-bold py-4 px-8 rounded-xl font-orbitron tracking-wider text-lg">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <script>
        // Game State
        let board = ['', '', '', '', '', '', '', '', ''];
        let gameActive = false;
        let currentPlayer = 'X';
        let playerMarker = 'X';
        let aiMarker = 'O';
        let difficulty = 'medium';
        let scores = { X: 0, O: 0, draw: 0 };

        // Audio Context for sound effects
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            switch(type) {
                case 'move':
                    oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(880, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                    break;
                case 'win':
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1);
                    oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2);
                    oscillator.frequency.setValueAtTime(1046.50, audioContext.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.6);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.6);
                    break;
                case 'lose':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.3);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                    break;
                case 'draw':
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.2);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.2);
                    break;
            }
        }

        // Initialize Board
        function initBoard() {
            const boardEl = document.getElementById('gameBoard');
            boardEl.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell bg-gray-800/50 rounded-xl flex items-center justify-center text-5xl md:text-6xl font-bold border border-gray-700';
                cell.dataset.index = i;
                cell.onclick = () => handleCellClick(i);
                boardEl.appendChild(cell);
            }
        }

        function handleCellClick(index) {
            if (!gameActive || board[index] !== '' || currentPlayer !== playerMarker) return;
            
            makeMove(index, playerMarker);
            
            if (gameActive) {
                currentPlayer = aiMarker;
                updateStatus();
                setTimeout(() => aiMove(), 500);
            }
        }

        function makeMove(index, marker) {
            board[index] = marker;
            const cell = document.querySelector(`[data-index="${index}"]`);
            cell.innerHTML = `<span class="${marker === 'X' ? 'x-mark' : 'o-mark'}">${marker}</span>`;
            cell.classList.add('taken');
            
            playSound('move');
            
            if (checkWin()) {
                endGame(false);
            } else if (board.every(cell => cell !== '')) {
                endGame(true);
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            }
        }

        function aiMove() {
            if (!gameActive) return;
            
            let index;
            
            switch(difficulty) {
                case 'easy':
                    index = getRandomMove();
                    break;
                case 'medium':
                    index = Math.random() > 0.4 ? getBestMove() : getRandomMove();
                    break;
                case 'hard':
                    index = getBestMove();
                    break;
                default:
                    index = getBestMove();
            }
            
            makeMove(index, aiMarker);
            updateStatus();
        }

        function getRandomMove() {
            const available = board.map((cell, idx) => cell === '' ? idx : null).filter(val => val !== null);
            return available[Math.floor(Math.random() * available.length)];
        }

        function getBestMove() {
            let bestScore = -Infinity;
            let move;
            
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = aiMarker;
                    let score = minimax(board, 0, false);
                    board[i] = '';
                    
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function minimax(board, depth, isMaximizing) {
            let result = checkWinner();
            if (result !== null) {
                if (result === aiMarker) return 10 - depth;
                if (result === playerMarker) return depth - 10;
                return 0;
            }
            
            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = aiMarker;
                        let score = minimax(board, depth + 1, false);
                        board[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = playerMarker;
                        let score = minimax(board, depth + 1, true);
                        board[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWinner() {
            const winConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];
            
            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            
            if (board.every(cell => cell !== '')) return 'draw';
            return null;
        }

        function checkWin() {
            const winner = checkWinner();
            if (winner && winner !== 'draw') {
                highlightWinningCells();
                return true;
            }
            return false;
        }

        function highlightWinningCells() {
            const winConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];
            
            for (let condition of winConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    [a, b, c].forEach(idx => {
                        document.querySelector(`[data-index="${idx}"]`).classList.add('winning-cell');
                    });
                    createParticles();
                    break;
                }
            }
        }

        function createParticles() {
            const boardEl = document.getElementById('gameBoard');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px');
                particle.style.setProperty('--ty', (Math.random() - 0.5) * 100 + 'px');
                boardEl.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function endGame(isDraw) {
            gameActive = false;
            const winner = checkWinner();
            
            setTimeout(() => {
                const modal = document.getElementById('gameOverModal');
                const icon = document.getElementById('winnerIcon');
                const text = document.getElementById('winnerText');
                const subtext = document.getElementById('winnerSubtext');
                
                modal.classList.remove('hidden');
                
                if (isDraw) {
                    scores.draw++;
                    document.getElementById('scoreDraw').textContent = scores.draw;
                    icon.textContent = '🤝';
                    text.textContent = 'DRAW!';
                    text.className = 'font-orbitron text-3xl font-bold mb-2 text-gray-400';
                    subtext.textContent = 'Good game!';
                    playSound('draw');
                } else if (winner === playerMarker) {
                    scores[playerMarker]++;
                    document.getElementById('scoreX').textContent = scores.X;
                    icon.textContent = '🏆';
                    text.textContent = 'YOU WIN!';
                    text.className = 'font-orbitron text-3xl font-bold mb-2 text-cyan-400';
                    subtext.textContent = 'Well played!';
                    playSound('win');
                } else {
                    scores[aiMarker]++;
                    document.getElementById('scoreO').textContent = scores.O;
                    icon.textContent = '🤖';
                    text.textContent = 'AI WINS!';
                    text.className = 'font-orbitron text-3xl font-bold mb-2 text-fuchsia-500';
                    subtext.textContent = 'Better luck next time!';
                    playSound('lose');
                }
            }, 500);
        }

        function updateStatus() {
            const statusEl = document.getElementById('statusText');
            if (currentPlayer === playerMarker) {
                statusEl.textContent = 'Your Turn';
                statusEl.className = 'font-orbitron text-lg text-cyan-300 tracking-wider';
            } else {
                statusEl.textContent = 'AI Thinking...';
                statusEl.className = 'font-orbitron text-lg text-fuchsia-400 tracking-wider animate-pulse';
            }
        }

        function startGame(marker) {
            playerMarker = marker;
            aiMarker = marker === 'X' ? 'O' : 'X';
            document.getElementById('startMenu').classList.add('hidden');
            resetGame();
            
            // Update score labels
            document.querySelector('#scoreX').nextElementSibling.textContent = playerMarker === 'X' ? 'Player (X)' : 'AI (X)';
            document.querySelector('#scoreO').nextElementSibling.textContent = playerMarker === 'O' ? 'Player (O)' : 'AI (O)';
            
            if (aiMarker === 'X') {
                setTimeout(() => aiMove(), 800);
            }
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';
            
            document.querySelectorAll('.cell').forEach(cell => {
                cell.innerHTML = '';
                cell.classList.remove('taken', 'winning-cell');
            });
            
            document.getElementById('strikeLine').classList.add('hidden');
            updateStatus();
            
            if (aiMarker === 'X') {
                setTimeout(() => aiMove(), 500);
            }
        }

        function showMenu() {
            document.getElementById('startMenu').classList.remove('hidden');
            gameActive = false;
        }

        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.diff === level) btn.classList.add('active');
            });
        }

        // Initialize
        initBoard();
        
        // First interaction to unlock audio
        document.addEventListener('click', () => {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }, { once: true });
    </script>
</body>
</html>
