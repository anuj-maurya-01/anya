<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake and Ladders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Roboto:wght@400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%);
            overflow: hidden;
            touch-action: none;
        }

        h1, h2, .game-font {
            font-family: 'Fredoka One', cursive;
        }

        /* 3D Dice Styles */
        .scene {
            width: 80px;
            height: 80px;
            perspective: 400px;
            display: inline-block;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: translateZ(-40px);
            transition: transform 1s;
        }

        .cube.show-1  { transform: translateZ(-40px) rotateY(0deg); }
        .cube.show-2  { transform: translateZ(-40px) rotateY(-90deg); }
        .cube.show-3  { transform: translateZ(-40px) rotateY(-180deg); }
        .cube.show-4  { transform: translateZ(-40px) rotateY(90deg); }
        .cube.show-5  { transform: translateZ(-40px) rotateX(-90deg); }
        .cube.show-6  { transform: translateZ(-40px) rotateX(90deg); }
        .cube.rolling { animation: spin 0.5s infinite linear; }

        @keyframes spin {
            0% { transform: translateZ(-40px) rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: translateZ(-40px) rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        .cube__face {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid #333;
            line-height: 80px;
            font-size: 40px;
            font-weight: bold;
            color: #333;
            text-align: center;
            background: white;
            border-radius: 10px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dot {
            display: block;
            width: 14px;
            height: 14px;
            background: #333;
            border-radius: 50%;
            position: absolute;
        }

        /* Dot positions for standard dice */
        /* Face 1 */
        .face-1 .dot:nth-child(1) { top: 33px; left: 33px; }
        
        /* Face 2 */
        .face-2 .dot:nth-child(1) { top: 15px; left: 15px; }
        .face-2 .dot:nth-child(2) { bottom: 15px; right: 15px; }

        /* Face 3 */
        .face-3 .dot:nth-child(1) { top: 15px; left: 15px; }
        .face-3 .dot:nth-child(2) { top: 33px; left: 33px; }
        .face-3 .dot:nth-child(3) { bottom: 15px; right: 15px; }

        /* Face 4 */
        .face-4 .dot:nth-child(1) { top: 15px; left: 15px; }
        .face-4 .dot:nth-child(2) { top: 15px; right: 15px; }
        .face-4 .dot:nth-child(3) { bottom: 15px; left: 15px; }
        .face-4 .dot:nth-child(4) { bottom: 15px; right: 15px; }

        /* Face 5 */
        .face-5 .dot:nth-child(1) { top: 15px; left: 15px; }
        .face-5 .dot:nth-child(2) { top: 15px; right: 15px; }
        .face-5 .dot:nth-child(3) { top: 33px; left: 33px; }
        .face-5 .dot:nth-child(4) { bottom: 15px; left: 15px; }
        .face-5 .dot:nth-child(5) { bottom: 15px; right: 15px; }

        /* Face 6 */
        .face-6 .dot:nth-child(1) { top: 15px; left: 15px; }
        .face-6 .dot:nth-child(2) { top: 15px; right: 15px; }
        .face-6 .dot:nth-child(3) { top: 33px; left: 15px; }
        .face-6 .dot:nth-child(4) { top: 33px; right: 15px; }
        .face-6 .dot:nth-child(5) { bottom: 15px; left: 15px; }
        .face-6 .dot:nth-child(6) { bottom: 15px; right: 15px; }

        .cube__face--front  { transform: rotateY(  0deg) translateZ(40px); }
        .cube__face--right  { transform: rotateY( 90deg) translateZ(40px); }
        .cube__face--back   { transform: rotateY(180deg) translateZ(40px); }
        .cube__face--left   { transform: rotateY(-90deg) translateZ(40px); }
        .cube__face--top    { transform: rotateX( 90deg) translateZ(40px); }
        .cube__face--bottom { transform: rotateX(-90deg) translateZ(40px); }

        canvas {
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-radius: 8px;
            background-color: white;
            max-width: 100%;
            max-height: 70vh;
        }

        .modal {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        .player-card {
            transition: all 0.3s ease;
        }
        .player-card.active {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
            border: 2px solid white;
        }

    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center text-white">

    <!-- Game UI Container -->
    <div id="game-container" class="relative flex flex-col items-center w-full max-w-4xl p-2 md:p-4">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-2">
            <h1 class="text-3xl md:text-4xl text-yellow-300 drop-shadow-md">Snakes & Ladders</h1>
            <div class="flex gap-4">
                 <!-- Player 1 Status -->
                 <div id="p1-card" class="player-card active bg-blue-600 rounded-lg p-2 px-4 flex items-center gap-2">
                    <div class="w-4 h-4 rounded-full bg-blue-300 border border-white"></div>
                    <div>
                        <div class="text-xs opacity-75">YOU</div>
                        <div class="font-bold text-xl" id="p1-score">1</div>
                    </div>
                 </div>
                 <!-- Player 2 Status -->
                 <div id="p2-card" class="player-card bg-red-600 rounded-lg p-2 px-4 flex items-center gap-2">
                    <div class="w-4 h-4 rounded-full bg-red-300 border border-white"></div>
                    <div>
                        <div class="text-xs opacity-75">CPU</div>
                        <div class="font-bold text-xl" id="p2-score">1</div>
                    </div>
                 </div>
            </div>
        </div>

        <!-- Canvas Board -->
        <canvas id="gameCanvas" width="600" height="600" class="mb-4"></canvas>

        <!-- Controls -->
        <div class="w-full flex justify-center items-center gap-8 h-24">
            <div id="status-text" class="text-lg md:text-xl font-bold text-center w-40">Your Turn!</div>
            
            <div class="scene">
                <div class="cube show-1" id="dice">
                    <div class="cube__face cube__face--front face-1"><span class="dot"></span></div>
                    <div class="cube__face cube__face--back face-6">
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                    </div>
                    <div class="cube__face cube__face--right face-2"><span class="dot"></span><span class="dot"></span></div>
                    <div class="cube__face cube__face--left face-5">
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                        <span class="dot"></span><span class="dot"></span>
                    </div>
                    <div class="cube__face cube__face--top face-4">
                        <span class="dot"></span><span class="dot"></span>
                        <span class="dot"></span><span class="dot"></span>
                    </div>
                    <div class="cube__face cube__face--bottom face-3">
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                    </div>
                </div>
            </div>

            <button id="roll-btn" class="bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-3 px-8 rounded-full shadow-lg transform transition active:scale-95 game-font text-xl">
                ROLL
            </button>
        </div>

    </div>

    <!-- Start Modal -->
    <div id="start-modal" class="modal fixed inset-0 flex items-center justify-center z-50">
        <div class="bg-white text-gray-800 p-8 rounded-2xl shadow-2xl text-center max-w-sm mx-4 transform transition-all scale-100">
            <h2 class="text-4xl mb-4 text-purple-600">Snake & Ladder</h2>
            <p class="mb-6 text-gray-600">Race to square 100! Watch out for snakes, they bite. Find ladders to climb fast.</p>
            <div class="space-y-3">
                <button onclick="startGame()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-xl shadow transition">
                    Start Game
                </button>
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal fixed inset-0 flex items-center justify-center z-50 hidden">
        <div class="bg-white text-gray-800 p-8 rounded-2xl shadow-2xl text-center max-w-sm mx-4">
            <h2 class="text-4xl mb-2 text-purple-600" id="winner-title">Winner!</h2>
            <p class="mb-6 text-gray-600" id="winner-msg">Player 1 wins the game.</p>
            <button onclick="resetGame()" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-8 rounded-xl shadow transition">
                Play Again
            </button>
        </div>
    </div>

<script>
    // --- Constants & Config ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 10;
    let cellSize = canvas.width / gridSize;

    // Game Data
    // Snakes: Key = Head (Start), Value = Tail (End)
    const snakes = { 
        16: 6, 46: 25, 49: 11, 62: 19, 64: 60, 74: 53, 89: 68, 92: 88, 95: 75, 99: 80 
    };
    // Ladders: Key = Bottom (Start), Value = Top (End)
    const ladders = { 
        2: 38, 7: 14, 8: 31, 15: 26, 21: 42, 28: 84, 36: 44, 51: 67, 71: 91, 78: 98, 87: 94 
    };

    // --- Audio Context for SFX ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playTone(freq, type, duration) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playSound(action) {
        switch(action) {
            case 'step': playTone(300, 'sine', 0.1); break;
            case 'snake': 
                playTone(150, 'sawtooth', 0.4); 
                setTimeout(() => playTone(100, 'sawtooth', 0.4), 100);
                break;
            case 'ladder': 
                playTone(400, 'triangle', 0.1); 
                setTimeout(() => playTone(600, 'triangle', 0.2), 100);
                break;
            case 'win':
                playTone(500, 'square', 0.2);
                setTimeout(() => playTone(700, 'square', 0.2), 200);
                setTimeout(() => playTone(900, 'square', 0.4), 400);
                break;
            case 'roll':
                playTone(800, 'triangle', 0.05);
                break;
        }
    }

    // --- Game State ---
    let players = [
        { id: 1, pos: 1, color: '#3B82F6', name: 'You' }, // Blue
        { id: 2, pos: 1, color: '#EF4444', name: 'CPU' }  // Red
    ];
    let currentPlayerIndex = 0; // 0 for Player 1, 1 for CPU
    let isRolling = false;
    let isMoving = false;
    let gameOver = false;

    // --- DOM Elements ---
    const diceEl = document.getElementById('dice');
    const rollBtn = document.getElementById('roll-btn');
    const statusText = document.getElementById('status-text');
    const p1Card = document.getElementById('p1-card');
    const p2Card = document.getElementById('p2-card');
    const p1Score = document.getElementById('p1-score');
    const p2Score = document.getElementById('p2-score');

    // --- Helper Functions ---

    // Convert Square ID (1-100) to Coordinates (x, y)
    function getCoords(square) {
        const index = square - 1;
        const row = Math.floor(index / gridSize);
        const col = index % gridSize;
        
        let x, y;
        
        // Rows go 0 (bottom) to 9 (top)
        // Visually, row 0 is at y = height - cellsize
        y = canvas.height - (row + 1) * cellSize + (cellSize/2);
        
        // Boustrophedon (Snake-like) layout
        // Even rows (0, 2, 4...) go Left to Right
        // Odd rows (1, 3, 5...) go Right to Left
        if (row % 2 === 0) {
            x = col * cellSize + (cellSize/2);
        } else {
            x = canvas.width - (col * cellSize) - (cellSize/2);
        }
        
        return { x, y };
    }

    // --- Drawing Functions ---

    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Draw Grid
        for (let i = 0; i < 100; i++) {
            const row = Math.floor(i / gridSize);
            const col = i % gridSize;
            const x = col * cellSize;
            const y = row * cellSize;

            // Checkered pattern
            ctx.fillStyle = (row % 2 === 0 ? col % 2 === 0 : col % 2 !== 0) ? '#FFFFFF' : '#F3F4F6';
            
            // Adjust y to draw from bottom up logically for loop, but canvas draws top down
            // Actually, let's just draw standard grid visuals
            ctx.fillRect(x, y, cellSize, cellSize);
        }

        // 2. Draw Numbers
        ctx.fillStyle = '#9CA3AF';
        ctx.font = 'bold 12px Roboto';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';

        for (let i = 1; i <= 100; i++) {
            const pos = getCoords(i);
            // Offset for text inside cell
            ctx.fillText(i, pos.x - cellSize/2 + 4, pos.y - cellSize/2 + 4);
        }

        // 3. Draw Snakes
        for (const [start, end] of Object.entries(snakes)) {
            drawSnake(getCoords(start), getCoords(end));
        }

        // 4. Draw Ladders
        for (const [start, end] of Object.entries(ladders)) {
            drawLadder(getCoords(start), getCoords(end));
        }

        // 5. Draw Players
        players.forEach((p, idx) => {
            const coords = getCoords(p.pos);
            // Offset slightly if on same square
            let offsetX = 0;
            if (players[0].pos === players[1].pos) {
                offsetX = idx === 0 ? -5 : 5;
            }

            ctx.beginPath();
            ctx.arc(coords.x + offsetX, coords.y, cellSize * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            
            // Add shadow/border
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fill();
            ctx.shadowBlur = 0; // Reset
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'white';
            ctx.stroke();
            ctx.closePath();
        });
    }

    function drawSnake(startPos, endPos) {
        ctx.beginPath();
        ctx.moveTo(startPos.x, startPos.y);
        
        // Control points for bezier curve to make it wavy
        const midX = (startPos.x + endPos.x) / 2;
        const midY = (startPos.y + endPos.y) / 2;
        
        // Randomize wave slightly
        const dist = Math.sqrt(Math.pow(endPos.x - startPos.x, 2) + Math.pow(endPos.y - startPos.y, 2));
        const offset = dist * 0.3;

        ctx.bezierCurveTo(
            midX + offset, startPos.y, 
            midX - offset, endPos.y, 
            endPos.x, endPos.y
        );

        ctx.lineWidth = 6;
        ctx.strokeStyle = '#10B981'; // Green
        ctx.lineCap = 'round';
        ctx.stroke();
        
        // Inner line
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#A7F3D0';
        ctx.stroke();

        // Head (at startPos - highest number)
        ctx.beginPath();
        ctx.arc(startPos.x, startPos.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = 'red';
        ctx.fill();
    }

    function drawLadder(startPos, endPos) {
        // Main Rails
        ctx.beginPath();
        ctx.moveTo(startPos.x - 5, startPos.y);
        ctx.lineTo(endPos.x - 5, endPos.y);
        ctx.moveTo(startPos.x + 5, startPos.y);
        ctx.lineTo(endPos.x + 5, endPos.y);
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#D97706'; // Wood color
        ctx.stroke();

        // Steps
        const steps = 5;
        const dx = (endPos.x - startPos.x) / steps;
        const dy = (endPos.y - startPos.y) / steps;

        ctx.lineWidth = 2;
        for (let i = 1; i < steps; i++) {
            ctx.beginPath();
            ctx.moveTo((startPos.x - 5) + dx * i, startPos.y + dy * i);
            ctx.lineTo((startPos.x + 5) + dx * i, startPos.y + dy * i);
            ctx.stroke();
        }
    }

    // --- Game Logic ---

    function updateUI() {
        p1Score.innerText = players[0].pos;
        p2Score.innerText = players[1].pos;
        
        if (currentPlayerIndex === 0) {
            p1Card.classList.add('active');
            p2Card.classList.remove('active');
            statusText.innerText = isMoving ? "Moving..." : "Your Turn";
            rollBtn.disabled = isMoving || isRolling;
            rollBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        } else {
            p2Card.classList.add('active');
            p1Card.classList.remove('active');
            statusText.innerText = "CPU Playing...";
            rollBtn.disabled = true;
            rollBtn.classList.add('opacity-50', 'cursor-not-allowed');
        }
    }

    function rollDiceLogic() {
        if (isRolling || isMoving || gameOver) return;
        
        // If CPU turn, user shouldn't click, but just in case
        if (currentPlayerIndex === 1 && !isCPUTurnActive) return;

        isRolling = true;
        playSound('roll');
        diceEl.classList.add('rolling');
        
        setTimeout(() => {
            const diceValue = Math.floor(Math.random() * 6) + 1;
            diceEl.classList.remove('rolling');
            
            // Remove previous classes
            for(let i=1; i<=6; i++) diceEl.classList.remove(`show-${i}`);
            // Add new face class
            diceEl.classList.add(`show-${diceValue}`);
            
            isRolling = false;
            movePlayer(diceValue);

        }, 600);
    }

    function movePlayer(steps) {
        isMoving = true;
        updateUI(); // Disable button

        const player = players[currentPlayerIndex];
        const target = player.pos + steps;
        
        // Cap at 100
        const finalTarget = target > 100 ? 100 : target; 
        
        // Wait a bit after dice stop
        setTimeout(() => {
            stepByStepMove(player, finalTarget);
        }, 300);
    }

    function stepByStepMove(player, target) {
        if (player.pos < target) {
            player.pos++;
            playSound('step');
            drawBoard();
            updateUI(); // Updates score text
            
            if (player.pos === 100) {
                // Game Won check immediately on hitting 100
                handleWin(player);
                return;
            }

            setTimeout(() => stepByStepMove(player, target), 300);
        } else {
            // Movement done, check for snakes/ladders
            checkEntity(player);
        }
    }

    function checkEntity(player) {
        let newPos = player.pos;
        let action = null;

        if (snakes[player.pos]) {
            newPos = snakes[player.pos];
            action = 'snake';
        } else if (ladders[player.pos]) {
            newPos = ladders[player.pos];
            action = 'ladder';
        }

        if (action) {
            setTimeout(() => {
                playSound(action);
                player.pos = newPos;
                drawBoard();
                updateUI();
                finishTurn(player);
            }, 500);
        } else {
            finishTurn(player);
        }
    }

    function finishTurn(player) {
        if (gameOver) return;

        // Win check again just in case (ladder to 100)
        if (player.pos >= 100) {
            handleWin(player);
            return;
        }

        isMoving = false;
        
        // Switch Player
        currentPlayerIndex = currentPlayerIndex === 0 ? 1 : 0;
        updateUI();

        // Trigger CPU if needed
        if (currentPlayerIndex === 1) {
            isCPUTurnActive = true;
            setTimeout(cpuTurn, 1000);
        } else {
            isCPUTurnActive = false;
        }
    }

    let isCPUTurnActive = false;
    function cpuTurn() {
        if (gameOver) return;
        rollDiceLogic();
    }

    function handleWin(player) {
        gameOver = true;
        isMoving = false;
        isRolling = false;
        playSound('win');
        
        document.getElementById('winner-title').innerText = player.name + " Wins!";
        document.getElementById('winner-msg').innerText = player.name === 'You' ? "Congratulations! Great game." : "Better luck next time!";
        document.getElementById('game-over-modal').classList.remove('hidden');
    }

    // --- Initialization & Resizing ---

    function resizeCanvas() {
        const container = document.getElementById('game-container');
        // keep square, max 600 or width of container
        const size = Math.min(container.clientWidth - 20, 600);
        canvas.width = size;
        canvas.height = size;
        cellSize = size / gridSize;
        drawBoard();
    }

    function startGame() {
        document.getElementById('start-modal').classList.add('hidden');
        if(audioCtx.state === 'suspended') audioCtx.resume();
        resetGameLogic();
    }

    function resetGame() {
        document.getElementById('game-over-modal').classList.add('hidden');
        resetGameLogic();
    }

    function resetGameLogic() {
        players[0].pos = 1;
        players[1].pos = 1;
        currentPlayerIndex = 0;
        gameOver = false;
        isRolling = false;
        isMoving = false;
        isCPUTurnActive = false;
        
        // Reset Dice visually
        for(let i=1; i<=6; i++) diceEl.classList.remove(`show-${i}`);
        diceEl.classList.add('show-1');

        drawBoard();
        updateUI();
    }

    // Event Listeners
    window.addEventListener('resize', resizeCanvas);
    rollBtn.addEventListener('click', () => {
        if(currentPlayerIndex === 0) rollDiceLogic();
    });

    // Initial Setup
    resizeCanvas();
    drawBoard();

</script>
</body>
</html>
