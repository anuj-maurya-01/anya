<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 30px;
            width: 100%;
            max-width: 500px;
        }
        
        .cell {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 15px;
            margin: 5px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
        }
        
        .cell:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .x {
            color: #ff6b6b;
        }
        
        .o {
            color: #4ecdc4;
        }
        
        .winning-cell {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        
        .player-x {
            background: rgba(255, 107, 107, 0.2);
        }
        
        .player-o {
            background: rgba(78, 205, 196, 0.2);
        }
        
        .btn {
            background: linear-gradient(to right, #ff6b6b, #ff8e53);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .winner-animation {
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .move-indicator {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 100;
            animation: fadeInOut 1s forwards;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.5); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="text-3xl md:text-4xl font-bold text-white text-center mb-2">Tic Tac Toe</h1>
        <p class="text-indigo-100 text-center mb-8">Enjoy the classic game!</p>
        
        <div class="flex justify-between items-center mb-6">
            <div class="bg-white bg-opacity-20 rounded-full py-2 px-4">
                <span class="text-white font-semibold">Player X</span>
            </div>
            <div class="bg-white bg-opacity-20 rounded-full py-2 px-4">
                <span class="text-white font-semibold">Player O</span>
            </div>
        </div>
        
        <div class="grid grid-cols-3 gap-3 mb-8" id="board">
            <div class="cell player-x" data-index="0">1</div>
            <div class="cell player-o" data-index="1">2</div>
            <div class="cell player-x" data-index="2">3</div>
            <div class="cell player-o" data-index="3">4</div>
            <div class="cell player-x" data-index="4">5</div>
            <div class="cell player-o" data-index="5">6</div>
            <div class="cell player-x" data-index="6">7</div>
            <div class="cell player-o" data-index="7">8</div>
            <div class="cell player-x" data-index="8">9</div>
        </div>
        
        <div class="flex flex-col space-y-4">
            <button id="resetBtn" class="btn text-lg py-3 px-6">Reset Game</button>
            <div class="flex justify-center space-x-4">
                <button id="addXBtn" class="btn bg-gradient-to-r from-red-500 to-orange-500 text-white py-2 px-4">Player X</button>
                <button id="addOBtn" class="btn bg-gradient-to-r from-teal-500 to-cyan-500 text-white py-2 px-4">Player O</button>
            </div>
        </div>
        
        <div class="mt-8 text-center">
            <p id="gameStatus" class="text-white text-xl font-semibold">Player X's Turn</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const board = document.getElementById('board');
            const resetBtn = document.getElementById('resetBtn');
            const addXBtn = document.getElementById('addXBtn');
            const addOBtn = document.getElementById('addOBtn');
            const gameStatus = document.getElementById('gameStatus');
            
            let currentPlayer = 'X';
            let gameActive = true;
            let gameState = ['', '', '', '', '', '', '', '', ''];
            let symbolDisplay = { X: null, O: null };
            
            // Initialize symbol displays
            symbolDisplay.X = 'X';
            symbolDisplay.O = 'O';
            
            // DOM elements
            const cells = document.querySelectorAll('.cell');
            
            // Add event listeners
            cells.forEach(cell => {
                cell.addEventListener('click', () => {
                    if (gameActive) {
                        const index = parseInt(cell.getAttribute('data-index'));
                        handleCellClick(index);
                    }
                });
            });
            
            resetBtn.addEventListener('click', resetGame);
            addXBtn.addEventListener('click', () => {
                gameActive = true;
                currentPlayer = 'X';
                updateGameStatus();
                resetHighlights();
            });
            addOBtn.addEventListener('click', () => {
                gameActive = true;
                currentPlayer = 'O';
                updateGameStatus();
                resetHighlights();
            });
            
            function handleCellClick(index) {
                if (gameState[index] === '' && gameActive) {
                    // Add symbol to cell
                    gameState[index] = currentPlayer;
                    cells[index].textContent = currentPlayer;
                    cells[index].classList.add(currentPlayer.toLowerCase());
                    
                    // Check for win or draw
                    const win = checkWin();
                    const draw = checkDraw();
                    
                    if (win) {
                        gameActive = false;
                        showWinner(currentPlayer);
                        playWinSound();
                    } else if (draw) {
                        gameActive = false;
                        gameStatus.textContent = "It's a Draw!";
                        playDrawSound();
                    } else {
                        // Switch player
                        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                        updateGameStatus();
                        playMoveSound();
                    }
                }
            }
            
            function checkWin() {
                const winPatterns = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
                    [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
                    [0, 4, 8], [2, 4, 6]             // diagonals
                ];
                
                return winPatterns.some(pattern => {
                    const [a, b, c] = pattern;
                    return gameState[a] !== '' && 
                           gameState[a] === gameState[b] && 
                           gameState[a] === gameState[c];
                });
            }
            
            function checkDraw() {
                return gameState.every(cell => cell !== '');
            }
            
            function showWinner(player) {
                gameStatus.classList.add('winner-animation');
                gameStatus.textContent = `Player ${player} Wins!`;
                
                // Highlight winning cells
                const winPatterns = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8],
                    [0, 3, 6], [1, 4, 7], [2, 5, 8],
                    [0, 4, 8], [2, 4, 6]
                ];
                
                winPatterns.forEach(pattern => {
                    const [a, b, c] = pattern;
                    if (gameState[a] === player && 
                        gameState[a] === gameState[b] && 
                        gameState[a] === gameState[c]) {
                        
                        cells[a].classList.add('winning-cell');
                        cells[b].classList.add('winning-cell');
                        cells[c].classList.add('winning-cell');
                    }
                });
            }
            
            function updateGameStatus() {
                gameStatus.textContent = `Player ${currentPlayer}'s Turn`;
            }
            
            function resetHighlights() {
                cells.forEach(cell => {
                    cell.classList.remove('winning-cell');
                });
                gameStatus.classList.remove('winner-animation');
            }
            
            function resetGame() {
                gameState = ['', '', '', '', '', '', '', '', ''];
                currentPlayer = 'X';
                gameActive = true;
                
                cells.forEach(cell => {
                    cell.textContent = '';
                    cell.classList.remove('x', 'o', 'winning-cell', 'player-x', 'player-o');
                });
                
                updateGameStatus();
                resetHighlights();
            }
            
            // Sound effects using Web Audio API
            function playMoveSound() {
                try {
                    const context = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = context.createOscillator();
                    const gainNode = context.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(context.destination);
                    
                    oscillator.frequency.value = 440;
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0.3, context.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.3);
                    
                    oscillator.start(context.currentTime);
                    oscillator.stop(context.currentTime + 0.3);
                } catch (e) {
                    console.log("Audio not supported");
                }
            }
            
            function playWinSound() {
                try {
                    const context = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = context.createOscillator();
                    const gainNode = context.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(context.destination);
                    
                    oscillator.frequency.value = 523.25; // C5
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0.3, context.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 1);
                    
                    oscillator.start(context.currentTime);
                    oscillator.stop(context.currentTime + 1);
                } catch (e) {
                    console.log("Audio not supported");
                }
            }
            
            function playDrawSound() {
                try {
                    const context = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = context.createOscillator();
                    const gainNode = context.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(context.destination);
                    
                    oscillator.frequency.value = 329.63; // E4
                    oscillator.type = 'triangle';
                    
                    gainNode.gain.setValueAtTime(0.3, context.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.5);
                    
                    oscillator.start(context.currentTime);
                    oscillator.stop(context.currentTime + 0.5);
                } catch (e) {
                    console.log("Audio not supported");
                }
            }
            
            // Add playful move indicator
            function showMoveIndicator(x, y) {
                const indicator = document.createElement('div');
                indicator.className = 'move-indicator';
                indicator.textContent = currentPlayer;
                indicator.style.left = `${x}px`;
                indicator.style.top = `${y}px`;
                document.body.appendChild(indicator);
                
                setTimeout(() => {
                    document.body.removeChild(indicator);
                }, 1000);
            }
            
            // Show move indicator when clicking a cell
            cells.forEach(cell => {
                cell.addEventListener('click', (e) => {
                    const rect = cell.getBoundingClientRect();
                    const x = rect.left + rect.width / 2;
                    const y = rect.top + rect.height / 2;
                    showMoveIndicator(x - rect.left, y - rect.top);
                });
            });
        });
    </script>
</body>
</html>
